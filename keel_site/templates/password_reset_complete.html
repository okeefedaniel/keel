<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keel | Admin Console</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  {% load static %}
  <link href="{% static 'css/docklabs.css' %}" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
</head>
<body class="d-flex align-items-center" style="min-height: 100vh; background: var(--ct-pale-blue);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <i class="bi bi-gear-wide-connected" style="font-size: 3rem; color: var(--ct-dark-blue);"></i>
          <h2 class="mt-2" style="color: var(--ct-dark-blue);">Keel</h2>
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-4 text-center">
            <i class="bi bi-check-circle" style="font-size: 2.5rem; color: var(--ct-green);"></i>
            <h5 class="mt-3" style="color: var(--ct-dark-blue);">Password Reset Complete</h5>
            <p class="text-muted" style="font-size: 0.9rem;">
              Your password has been set. You can now sign in with your new password.
            </p>
            <a href="{% url 'login' %}" class="btn btn-primary mt-2">
              <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
            </a>
          </div>
        </div>

        <p class="text-center text-muted mt-3" style="font-size: 0.8rem;">
          DockLabs &middot; Keel Platform
        </p>
      </div>
    </div>
  </div>
</body>
</html>
