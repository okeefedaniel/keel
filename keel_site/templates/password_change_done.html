{% extends "base.html" %}
{% block title %}Password Changed{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4 text-center">
      <i class="bi bi-check-circle" style="font-size: 3rem; color: var(--ct-green, #28a745);"></i>
      <h3 class="mt-3" style="color: var(--ct-dark-blue);">Password Updated</h3>
      <p class="text-muted">Your password has been changed successfully.</p>
      <a href="{% url 'home' %}" class="btn btn-primary">
        <i class="bi bi-house me-1"></i>Back to Dashboard
      </a>
    </div>
  </div>
</div>
{% endblock %}
