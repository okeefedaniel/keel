<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keel | Admin Console</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  {% load static %}
  <link href="{% static 'css/docklabs.css' %}" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
</head>
<body class="d-flex align-items-center" style="min-height: 100vh; background: var(--ct-pale-blue);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <i class="bi bi-gear-wide-connected" style="font-size: 3rem; color: var(--ct-dark-blue);"></i>
          <h2 class="mt-2" style="color: var(--ct-dark-blue);">Keel</h2>
          <p class="text-muted">Reset Your Password</p>
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-4">
            <p class="text-muted" style="font-size: 0.9rem;">
              Enter the email address associated with your account. We'll send you a link to reset your password.
            </p>
            <form method="post">
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label" for="id_email">Email address</label>
                <input type="email" name="email" id="id_email" class="form-control" autofocus required
                       placeholder="you@example.com">
                {% if form.email.errors %}
                <div class="text-danger mt-1" style="font-size: 0.85rem;">{{ form.email.errors.0 }}</div>
                {% endif %}
              </div>
              <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-envelope me-1"></i>Send Reset Link
              </button>
            </form>
            <div class="text-center mt-3">
              <a href="{% url 'login' %}" class="text-muted" style="font-size: 0.85rem;">
                <i class="bi bi-arrow-left me-1"></i>Back to Sign In
              </a>
            </div>
          </div>
        </div>

        <p class="text-center text-muted mt-3" style="font-size: 0.8rem;">
          DockLabs &middot; Keel Platform
        </p>
      </div>
    </div>
  </div>
</body>
</html>
