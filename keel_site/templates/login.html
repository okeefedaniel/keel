<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keel | Admin Console</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  {% load static %}
  <link href="{% static 'css/docklabs.css' %}" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
</head>
<body class="d-flex align-items-center" style="min-height: 100vh; background: var(--ct-pale-blue);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <i class="bi bi-gear-wide-connected" style="font-size: 3rem; color: var(--ct-dark-blue);"></i>
          <h2 class="mt-2" style="color: var(--ct-dark-blue);">Keel</h2>
          <p class="text-muted">DockLabs Admin Console</p>
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-4">
            {% if form.errors %}
            <div class="alert alert-danger py-2">
              <small>Invalid username or password.</small>
            </div>
            {% endif %}

            <form method="post">
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label" for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-control" autofocus required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
              </button>
            </form>
            <div class="text-center mt-3">
              <a href="{% url 'password_reset' %}" class="text-muted" style="font-size: 0.85rem;">
                Forgot your password?
              </a>
            </div>
          </div>
        </div>

        <p class="text-center text-muted mt-3" style="font-size: 0.8rem;">
          DockLabs &middot; Keel Platform
        </p>
      </div>
    </div>
  </div>
</body>
</html>
