<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', -apple-system, sans-serif; background: #faf9f7; color: #1a1a1a; }
        .error-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-icon { width: 72px; height: 72px; border-radius: 16px; background: #fef8e7; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
        .error-icon i { font-size: 2rem; color: #b8860b; }
        h1 { color: #1a3a6b; font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }
        .error-code { font-size: 4rem; font-weight: 700; color: #e8e5e0; letter-spacing: -0.04em; line-height: 1; margin-bottom: 0.5rem; }
        p { color: #6b6b6b; }
        .btn-primary { background: #1a3a6b; border-color: #1a3a6b; border-radius: 6px; font-weight: 500; font-family: 'Poppins', sans-serif; }
        .btn-primary:hover { background: #254d8f; border-color: #254d8f; }
        .btn-outline-secondary { color: #6b6b6b; border-color: #e8e5e0; border-radius: 6px; font-weight: 500; font-family: 'Poppins', sans-serif; }
        .btn-outline-secondary:hover { background: #f7f6f3; border-color: #e8e5e0; color: #1a1a1a; }
        .brand { color: #9b9b9b; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="text-center py-5" style="max-width: 440px;">
            <div class="error-code">404</div>
            <div class="error-icon">
                <i class="bi bi-search"></i>
            </div>
            <h1 class="mb-3">Page not found</h1>
            <p class="mb-4">
                The page you're looking for doesn't exist or has been moved.
            </p>
            <div class="d-flex justify-content-center gap-3 mb-4">
                <a href="/" class="btn btn-primary px-4">
                    <i class="bi bi-house me-1"></i>Go Home
                </a>
                <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
                    <i class="bi bi-arrow-left me-1"></i>Go Back
                </a>
            </div>
            <p class="brand">
                <i class="bi bi-gear-wide-connected me-1"></i>DockLabs
            </p>
        </div>
    </div>
</body>
</html>
