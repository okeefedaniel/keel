{% extends "keel/layouts/auth.html" %}

{% block title %}Check Your Email{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5 col-xl-4">
    <div class="text-center mb-4">
      <i class="bi bi-check-circle display-4 text-success"></i>
      <h1 class="h3 mt-3 mb-1">Reset link sent!</h1>
      <p class="text-muted">
        If an account exists with that email, you'll receive a password reset link shortly.
        Check your inbox and spam folder.
      </p>
    </div>

    <div class="text-center">
      <a href="{% url 'account_login' %}" class="btn btn-outline-primary">
        <i class="bi bi-arrow-left me-2"></i>Back to sign in
      </a>
    </div>
  </div>
</div>
{% endblock %}
