{% extends "keel/layouts/auth.html" %}

{% block title %}Password Updated{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5 col-xl-4">
    <div class="text-center mb-4">
      <i class="bi bi-check-circle display-4 text-success"></i>
      <h1 class="h3 mt-3 mb-1">Password updated!</h1>
      <p class="text-muted">
        Your password has been reset successfully. You can now sign in with your new password.
      </p>
    </div>

    <div class="text-center">
      <a href="{% url 'account_login' %}" class="btn btn-primary">
        <i class="bi bi-box-arrow-in-right me-2"></i>Go to sign in
      </a>
    </div>
  </div>
</div>
{% endblock %}
