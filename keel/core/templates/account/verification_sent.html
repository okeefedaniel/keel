{% extends "keel/layouts/auth.html" %}

{% block title %}Verify Your Email{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5 col-xl-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body text-center p-4 p-md-5">
        <i class="bi bi-envelope-check display-4 text-primary d-block mb-3"></i>
        <h2 class="fw-bold">Check your email</h2>
        <p class="text-muted">
          We've sent a confirmation link to your email address.
          Click the link to activate your account.
        </p>
        <a href="{% url 'account_login' %}" class="btn btn-outline-primary">
          <i class="bi bi-arrow-left me-2"></i>Back to sign in
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
