<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; background-color: #f8f8f8; color: #333; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; }
    .header { background-color: #00214D; padding: 20px 30px; }
    .header h1 { color: #fff; font-size: 20px; margin: 0; font-family: 'Poppins', Arial, sans-serif; }
    .body { padding: 30px; }
    .body h2 { color: #00214D; font-size: 18px; margin-top: 0; }
    .body p { line-height: 1.6; color: #333; }
    .cta { display: inline-block; background-color: #1F64E5; color: #fff !important; padding: 12px 24px; text-decoration: none; border-radius: 6px; font-weight: 600; margin: 20px 0; }
    .footer { padding: 20px 30px; background-color: #f8f8f8; text-align: center; font-size: 12px; color: #999; }
    .footer a { color: #1F64E5; text-decoration: none; }
    .priority-high { border-left: 4px solid #E91C1F; }
    .priority-urgent { border-left: 4px solid #E91C1F; background-color: #FFF5F5; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{ site_name }}</h1>
    </div>
    <div class="body {% if priority == 'high' %}priority-high{% elif priority == 'urgent' %}priority-urgent{% endif %}">
      <h2>{{ title }}</h2>
      <p>{{ message }}</p>
      {% if absolute_link %}
      <a href="{{ absolute_link }}" class="cta">View Details</a>
      {% endif %}
    </div>
    <div class="footer">
      <p>
        This notification was sent by <a href="{{ absolute_link }}">{{ site_name }}</a>.<br>
        You can manage your notification preferences in your account settings.
      </p>
    </div>
  </div>
</body>
</html>
